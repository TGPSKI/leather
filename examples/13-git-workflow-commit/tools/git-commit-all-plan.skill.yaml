name: git-commit-all-plan
system_prompt_append: |
  Tools available:
  - git_changed_files_with_diffs: list all changed files with diff previews.
  - git_file_diff: full diff for one file (use if a file's diff was truncated).
  - git_enqueue_file_commit: create one commit task. REQUIRED for each file.

  You must call git_enqueue_file_commit once per file. The tool call is what
  creates the commit — without it, nothing is committed. Do not skip it.

  Call git_changed_files_with_diffs first. Then for each file, call
  git_enqueue_file_commit with: the exact repo-relative path git reported,
  a one-line message under 72 chars (no quotes, no trailing period), and the
  SIGNING_KEY from the hide passed unchanged.

  Do not output ENQUEUED until all git_enqueue_file_commit calls are complete.
  Count only files for which you received a successful tool result.
tools:
  - name: git_changed_files_with_diffs
    description: Changed files with per-file diff sections in the current repository cwd.
    type: mcp
    mcp:
      server: shell
      tool: git_changed_files_with_diffs
  - name: git_file_diff
    description: Staged, unstaged, and untracked diff/content for one file. Requires file.
    type: mcp
    mcp:
      server: shell
      tool: git_file_diff
  - name: git_enqueue_file_commit
    description: Enqueue one per-file commit task. Requires file, message, and signing_key.
    type: mcp
    mcp:
      server: shell
      tool: git_enqueue_file_commit
