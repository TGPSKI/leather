agent_dir: agents
tool_dir: tools
state_dir: .state
log_level: info

# Override at runtime: LEATHER_LLM_ENDPOINT=http://... LEATHER_MODEL=<name> make 12
model: llama3
llm_timeout: 120s
max_tokens: 8192
completion_reserve: 1024
summarize_threshold: 0.85

api: true
api_addr: 127.0.0.1:7749

scheduler_tick: 1s
max_concurrent_jobs: 4
persist_runs: true
