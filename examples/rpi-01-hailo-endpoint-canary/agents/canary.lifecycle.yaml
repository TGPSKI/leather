agent: canary
max_tokens: 1024
instances:
  - name: readme-summary-01
    schedule: once
    prompt: leather Local agent infrastructure in one stdlib-only Go binary. Leather runs file-defined AI agents on your workstation, server, or Raspberry Pi. Use it for scheduled jobs, one-shot agent runs, webhook-driven workflows, local tool calling, and auditable agent outputs. No extra stack, hosted control plane, broker, telemetry, or dependency pile required. leather run ~/.leather/agents/summarizer.agent.md leather serve --pretty --stats leather ingest pr.json --curing pr-review A local agent runtime, orchestration harness, and workflow service for developer workstations and home-network servers. Zero external Go dependencies. No cloud. No telemetry. No surprises. intake curing notify hide queue artifact raw input durable work stabilized output leather turns raw operational signal - a PR diff, a webhook payload, a long log file, a scheduled prompt - into bounded, auditable, agent-authored artifacts.
  - name: readme-summary-02
    schedule: once
    prompt:  The same binary runs as a one-shot CLI, an interactive chat, and a long-running service. Why leather . You need... . leather gives you . . Scheduled agents against a local LLM . leather serve + cron schedules + token-budget management . . Event-driven workflows from webhooks . Tannery intake to router to curing worker to artifact . . Tool-calling agents without an extra stack . Skills, toolsets, MCP servers, and shell-mcp - all stdlib Go . . Reproducibility across runs . Persistent run history (JSONL) + snapshot replay + content-addressed artifacts . . Hard ceiling on context bloat . Hides are paged. Sessions only ever see a cut. . . To audit what an agent actually did . Every artifact carries lineage - agent, curing, hide id, timestamps . The vocabulary (read this first - it makes the docs make sense) leather uses a deliberate metaphor borrowed from leatherworking.
  - name: readme-summary-03
    schedule: once
    prompt: Pick it up in 60 seconds and the rest of the docs read smoothly - Leather the CLI/runtime/binary Tanning your local working area - configs, agents, curings, tools (a folder) Tannery the long-running workspace service composed from queue+worker+scheduler+session Hide raw input material - a PR thread, an API response, a log HideBuffer in-memory paged view of one hide Cut the bounded slice an agent actually sees in its context window Curing a named N-agent workflow that transforms hides into artifacts Operation one agent working on one or more cuts in a single turn Artifact stabilized output with lineage (which curing, which hide, when) Intake how hides get created (webhook, HTTP poll, CLI ingest, file) Full reference - docs/GLOSSARY.md.
  - name: readme-summary-04
    schedule: once
    prompt: Install From source - git clone https -//github.com/tgpski/leather cd leather make build && make build-shell-mcp With go install - go install github.com/tgpski/leather/cmd/leather@latest go install github.com/tgpski/leather/cmd/shell-mcp@latest Requirements - Go 1.26+, an OpenAI-compatible endpoint (e.g. Ollama, vLLM, llama.cpp, LM Studio, or a remote OpenAI endpoint). That s it. A 60-second tour 1. Write an agent name - summarizer You are a concise planning assistant. Output bullet points only. That s a complete .agent.md file. Front matter declares identity, the body is the system prompt. 2. Give it a schedule (optional) agent - summarizer schedule - 0 9 model - llama3 prompt - Summarize the three most important things to do today. .lifecycle.yaml files sit next to agents and carry the when and how. 3.
  - name: readme-summary-05
    schedule: once
    prompt: Chunk Run it leather validate check everything parses leather run ~/.leather/agents/summarizer.agent.md run once leather serve --pretty --stats run on schedule leather chat --model llama3 talk to the model interactively 4.
  - name: readme-summary-06
    schedule: once
    prompt:  Add a workflow (when one agent isn t enough) Two agents passing a hide between them, dispatched by a webhook - tannery.yaml hide_dir - ./.tannery/hides artifact_dir - ./.tannery/artifacts webhooks - path - /webhook/github secret_env - GITHUB_WEBHOOK_SECRET source - github routes - source - github event_type - pull_request curing - pr-review queue - pr-review curings/pr-review.curing.yaml name - pr-review queue - pr-review agents - name - triage decides what the PR is and tags it name - reviewer reads the diff in cuts, comments inline output - artifact - true leather serve --config tannery/config.yaml now POSTs to /webhook/github with a valid HMAC enqueue a curing run You now have an event-driven, tool-calling, multi-agent flow running locally with a single binary and stdlib Go. No broker. No daemon you didn t start. No SaaS. What you actually get Local agent runtime Agents are Markdown + YAML.
  - name: readme-summary-07
    schedule: once
    prompt: They run against any OpenAI-compatible endpoint. Token budgets are tracked per request . context is summarized or truncated before the model s limit hits. Tools, skills, MCP, and shell Skills (.skill.yaml) define tools plus optional prompt/parameter metadata. Toolsets (.toolset.yaml) bundle named tool collections. MCP servers (mcp-servers.yaml) plug in any stdio-transport MCP server. shell-mcp is a companion binary that turns a JSON manifest into a fast local tool surface - git, gh, anything you d put behind a shell command.
  - name: readme-summary-08
    schedule: once
    prompt: Tannery - the event-driven workflow service A tannery.yaml next to your config turns leather serve into a workspace - HTTP intake (/intake) and webhooks (/webhook/) with HMAC validation Per-curing queues with backpressure and bounded body sizes Per-curing workers with concurrency caps, retry, and dead-letter routing Hide pagination so multi-megabyte inputs don t blow the context window Artifact store with lineage and content-addressed IDs A process lock file so two leather serve instances can t fight over the same state Replay, snapshots, and run history --persist-runs writes every turn to JSONL with rotation --replay and --replay-live reconstruct past sessions deterministically /snapshot and /replay/ HTTP endpoints when the API is enabled Notifications Telegram, Signal, file, webhook, queue. Configure once, point any artifact at it. Commands . Command . Purpose . . leather serve .
  - name: readme-summary-09
    schedule: once
    prompt: Scheduler, queue workers, optional HTTP API, optional tannery, optional replay. . . leather run . Execute one agent definition once and exit. . . leather chat . Interactive chat session with token-budget management. . . leather ingest . Create a hide from a file or stdin and (optionally) enqueue a curing. . . leather validate . Validate config, agents, lifecycles, skills, workers, and MCP servers. . . leather test-agent . Run an agent against MockLLM and print the transcript. . . leather status . Print scheduler state and current token-budget settings. . . leather replay . Replay a snapshot or live session. . . leather version / leather help . The obvious. . Configuration config.Load seeds defaults from built-ins and LEATHER_ env vars, overlays config.yaml, then applies explicitly-set CLI flags.
  - name: readme-summary-10
    schedule: once
    prompt:  In order of precedence - Explicit flag YAML config Environment variable Built-in default Every flag has a matching env var - --flag-name to LEATHER_FLAG_NAME. Shared flags (click to expand) . Flag . Env var . Default . Notes . . --config . LEATHER_CONFIG . ~/.leather/config.yaml . Config file path. . . --agent-dir . LEATHER_AGENT_DIR . ~/.leather/agents . Agent and lifecycle directory. . . --model . LEATHER_MODEL . empty . Global default model name. . . --temperature . LEATHER_TEMPERATURE . 0.7 . Global default sampling temperature. . . --log-level . LEATHER_LOG_LEVEL . info . debug, info, warn, error. . . --log-format . LEATHER_LOG_FORMAT . text . text or json. . . --max-tokens . LEATHER_MAX_TOKENS . 8192 . Default max context window. . . --completion-reserve . LEATHER_COMPLETION_RESERVE . 1024 . Tokens reserved for completion. . . --summarize-threshold . LEATHER_SUMMARIZE_THRESHOLD . 0.85 . Summarization trigger ratio. . .
  - name: readme-summary-11
    schedule: once
    prompt:  --llm-endpoint . LEATHER_LLM_ENDPOINT . http -//localhost -11434 . OpenAI-compatible base URL. . . --llm-api-key . LEATHER_LLM_API_KEY . empty . Bearer token for cloud OpenAI-compatible endpoints. Empty = no auth. . . --llm-timeout . LEATHER_LLM_TIMEOUT . 60s . Request timeout. . . --scheduler-tick . LEATHER_SCHEDULER_TICK . 1m . Scheduler wake interval. . . --max-concurrent-jobs . LEATHER_MAX_CONCURRENT_JOBS . 4 . Scheduler concurrency cap. . . --run-duration . LEATHER_RUN_DURATION . 0 . Serve exits after this duration . 0 means unlimited. . . --max-jobs . LEATHER_MAX_JOBS . 0 . Serve exits after this many completed jobs . 0 means unlimited. . . --state-dir . LEATHER_STATE_DIR . ~/.leather/.state . Scheduler state root. . . --api . LEATHER_API . false . Enable serve HTTP API. . . --api-addr . LEATHER_API_ADDR . 127.0.0.1 -7749 . HTTP API bind address. . . --log-file . LEATHER_LOG_FILE . empty .
  - name: readme-summary-12
    schedule: once
    prompt:  Tee structured logs to file, or file-only in pretty mode. . . --pretty . LEATHER_PRETTY . false . Human-readable console rendering. . . --pretty-mode . LEATHER_PRETTY_MODE . all . messages or all. . . --stats . LEATHER_STATS . false . Print token stats and summaries. . . --tokens-per-turn . LEATHER_TOKENS_PER_TURN . false . Print per-turn token usage in pretty mode. . . --persist-runs . LEATHER_PERSIST_RUNS . false . Persist JSONL run history. . . --run-history-dir . LEATHER_RUN_HISTORY_DIR . empty . Defaults to state-dir /runs when persistence is enabled. . . --run-max-bytes . LEATHER_RUN_MAX_BYTES . 10485760 . Rotate run logs at this size. . . --replay . LEATHER_REPLAY . empty . Snapshot replay file. . . --replay-live . LEATHER_REPLAY_LIVE . empty . Live replay directory. . . --replay-speed . LEATHER_REPLAY_SPEED . 1.0 . Replay speed multiplier. . . --tool-dir . LEATHER_TOOL_DIR . empty .
  - name: readme-summary-13
    schedule: once
    prompt:  Directory containing .skill.yaml and .toolset.yaml. . . --default-toolsets . LEATHER_DEFAULT_TOOLSETS . empty . Comma-separated toolsets applied to every agent. . . --max-tool-rounds . LEATHER_MAX_TOOL_ROUNDS . 5 . Default tool-call round cap. . . --worker-dir . LEATHER_WORKER_DIR . empty . Directory containing .worker.yaml. . . --cache-dir . LEATHER_CACHE_DIR . empty . Defaults to state-dir /cache in serve mode. . . --mcp-servers-file . LEATHER_MCP_SERVERS_FILE . empty . run, serve, and validate fall back to ~/.leather/mcp-servers.yaml. . . --loop . LEATHER_LOOP . 1 . Repeat leather run this many times. .
  - name: readme-summary-14
    schedule: once
    prompt: Example config.yaml agent_dir - ~/.leather/agents model - llama3 llm_endpoint - http -//localhost -11434 llm_timeout - 90s max_tokens - 8192 summarize_threshold - 0.85 pretty - true stats - true tool_dir - ~/.leather/tools default_toolsets - release-read persist_runs - true api - true api_addr - 127.0.0.1 -7749 Cloud LLM endpoints leather speaks the OpenAI Chat Completions API, so any cloud or self-hosted endpoint that implements the same spec works without a Go recompile - only llm_endpoint, model, and an API key change. Provide the bearer token in whichever form fits your deployment - Inline (good for one-offs) leather run --agent hello --llm-endpoint https -//api.openai.com --model gpt-4o-mini --llm-api-key sk-... Environment variable export LEATHER_LLM_API_KEY= sk-...
  - name: readme-summary-15
    schedule: once
    prompt: leather serve --llm-endpoint https -//api.openai.com --model gpt-4o-mini For long-running servers the recommended form is the Unix pass store, with an env var as fallback. In config.yaml - llm_endpoint - https -//api.openai.com model - gpt-4o-mini llm_api_key - pass - openai/api-key pass show openai/api-key env - OPENAI_API_KEY fallback when pass is empty or unavailable Resolution order - --llm-api-key flag to LEATHER_LLM_API_KEY env to inline YAML value to pass show path to os.Getenv(env). The resolved key is sent only as Authorization - Bearer key and is never written to structured logs. Repository layout cmd/leather/ primary entrypoint .
