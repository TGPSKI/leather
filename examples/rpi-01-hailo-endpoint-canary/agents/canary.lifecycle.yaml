    schedule: once
    prompt: delegates to internal/cli cmd/shell-mcp/ stdio MCP server for local shell tools internal/agent/ agent and lifecycle parsing internal/artifact/ artifact store with lineage internal/cache/ file-backed response cache internal/cli/ command handlers, serve wiring, API, replay, tannery HTTP internal/config/ flag/env/YAML config loader (incl.
  - name: readme-summary-17
    schedule: once
    prompt: tannery.yaml parser) internal/curing/ curing worker, supervisor, router, loader internal/hide/ HideBuffer (in-memory) + Store (persistent, flock d) internal/logging/ structured logging helpers internal/mcp/ MCP loader, client, registry internal/model/ shared domain types internal/notify/ Telegram, Signal, webhook, file, queue backends internal/queue/ JSONL FIFO queue manager internal/runner/ multi-turn execution loop internal/scheduler/ cron scheduler and state persistence internal/schema/ flat-schema validation internal/session/ token budgets and LLM client interface internal/tool/ skill/toolset registry and execution internal/worker/ polling workers tanning/ example tanning (production config + agents + tools) docs/ARCHITECTURE.md package graph and runtime overview docs/GLOSSARY.md authoritative vocabulary docs/modules/ per-package documentation docs/competitive-landscape/ how leather compares to LangGraph, n8n, Goose, etc.
  - name: readme-summary-18
    schedule: once
    prompt: Development make build the binary make build-shell-mcp the companion MCP server make test go test ./... make test-race go test -race ./... make check gofmt + go vet make lint golangci-lint make ci check + test-race + lint + integration make bench benchmarks make cover coverage report The test suite runs entirely against t.TempDir() and session.MockLLM - a live model is not required for unit or integration tests. Go deeper Runnable examples to examples/ - six end-to-end demos, each one a single make target away Architecture & data flow to docs/ARCHITECTURE.md Glossary to docs/GLOSSARY.md Per-package docs to docs/modules/ How leather compares to docs/competitive-landscape/ AI agent contributor guide to AGENTS.md Domain-specific subagent guides to .subagents/ Project values Stdlib only. go.mod has no require entries. It s a hard rule. Fail closed. Bad config, missing budgets, unknown agents to clear errors, never silent fallthrough.
  - name: readme-summary-19
    schedule: once
    prompt: No telemetry. Nothing phones home. Ever. Small packages, auditable files. Targets 500 LOC per file. A reviewer should read any package in under ten minutes. Every flag has an env var, every env var has a flag. No hidden knobs. If those line up with how you want your tooling to behave - clone it, fork it, try a curing on something you actually care about, and tell us what broke. The fastest way to make leather better is to push it past its current edges.
