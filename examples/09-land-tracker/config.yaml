agent_dir: agents
tool_dir: tools
state_dir: .state
log_level: info

llm_timeout: 120s
llm_endpoint: http://localhost:8000
model: llama3
max_tokens: 8192
completion_reserve: 1024
summarize_threshold: 0.85

api: true
api_addr: 127.0.0.1:7749


scheduler_tick: 1s
max_concurrent_jobs: 2
persist_runs: true

notify:
  backends:
    - name: telegram-ops
      type: telegram
      # Edit chat_id to your Telegram chat or channel ID.
      chat_id: "YOUR_TELEGRAM_CHAT_ID"
      token:
        # Option A: password-store entry.
        pass: telegram/YOUR_BOT
        # Option B: set LEATHER_TELEGRAM_BOT_TOKEN env var (uncomment below, comment pass above).
        # env: LEATHER_TELEGRAM_BOT_TOKEN
